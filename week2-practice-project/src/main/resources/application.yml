spring:
  application:
    name: week2-practice-project

  ai:
    # ChatClient auto-configuration 비활성화 (AiConfig에서 수동 생성)
    chat:
      client:
        enabled: false

    # OpenAI (기본)
    openai:
      api-key: ${OPENAI_API_KEY:sk-proj-XXXXXXXXXXXXXX}
      chat:
        options:
          # gpt-4.1-nano, gpt-4.1-mini, gpt-4.1 등
          model: gpt-4.1-nano
          temperature: 0.7
          max-tokens: 1000

    # Ollama (프로필 활성화 시 사용)
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          # llama3.2, mistral, gemma2, gpt-oss:120b 등
          model: llama3.2
          temperature: 0.7

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
    com.study.springai: DEBUG

---
# ================================================================
#  Ollama Profile
#  실행: ./gradlew bootRun --args='--spring.profiles.active=ollama'
# ================================================================
spring:
  config:
    activate:
      on-profile: ollama
  ai:
    openai:
      enabled: false
